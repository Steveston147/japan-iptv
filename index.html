<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Japan IPTV M3U</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 760px; margin: 64px auto; padding: 0 20px; line-height: 1.7; }
    section { margin: 28px 0; padding: 20px; border: 1px solid #aaa; border-radius: 10px; }
    code { display: block; margin-top: 8px; overflow-wrap: anywhere; }
    a { color: #1677c8; }
  </style>
</head>
<body>
  <h1>Japan IPTV M3U</h1>
  <p>用途に応じてプレイリストを選べます。</p>

  <section>
    <h2>日本テレビ局・充実版（おすすめ）</h2>
    <p>地上波、BS、CS、ニュース、スポーツなどを幅広く収録し、成人向け、パチンコ・公営競技、通販を除外します。</p>
    <p><a href="/api/reaperc-clean.m3u">日本テレビ局・充実版を開く</a></p>
    <code id="reaperc"></code>
  </section>

  <section>
    <h2>IPTV-org整理版</h2>
    <p>公式・公開系を中心に、日本向けチャンネルを整理した少数精鋭版です。</p>
    <p><a href="/api/iptv-org.m3u">IPTV-org整理版を開く</a></p>
    <code id="iptvorg"></code>
  </section>

  <section>
    <h2>Full版</h2>
    <p>地上波代替を含む幅広いチャンネル。成人向け、ギャンブル、通販は除外しています。</p>
    <p><a href="/api/full.m3u">Full版を開く</a></p>
    <code id="full"></code>
  </section>

  <section>
    <h2>Stable版</h2>
    <p>信頼性の高い公開配信基盤に限定した安定重視版です。</p>
    <p><a href="/api/stable.m3u">Stable版を開く</a></p>
    <code id="stable"></code>
  </section>

  <script>
    document.getElementById("reaperc").textContent =
      location.origin + "/api/reaperc-clean.m3u";
    document.getElementById("iptvorg").textContent =
      location.origin + "/api/iptv-org.m3u";
    document.getElementById("full").textContent =
      location.origin + "/api/full.m3u";
    document.getElementById("stable").textContent =
      location.origin + "/api/stable.m3u";
  </script>
</body>
</html>
